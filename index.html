    <meta name="twitter:title" content="Chef Yum | Master of Nigerian Cuisine" />

    <!-- ═══════════════════════════════════════════════════════════════
         JSON-LD PERSON SCHEMA — Google Knowledge Graph

         ═══════════════════════════════════════════════════════════════ -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Person",
        "name": "[Chef Yum's Real Full Legal Name]",
        "alternateName": "Chef Yum",
        "url": "https://www.chefyum.com",
        "image": {
          "@type": "ImageObject",
          "url": "https://www.chefyum.com/images/chef-yum-headshot-4k.jpg",
          "width": 3840,
          "height": 4800,
          "caption": "Chef Yum — Executive Chef & Nigerian Culinary Artist"
        },
        "jobTitle": "Executive Chef & Culinary Artist",
        "description": "Chef Yum is a celebrated culinary artist and executive chef specialising in elevated Nigerian cuisine, known for transforming traditional West African dishes into world-class fine dining experiences.",
        "nationality": {
          "@type": "Country",
          "name": "Nigeria"
        },
        "birthPlace": {
          "@type": "Place",
          "name": "Lagos, Nigeria"
        },
        "knowsAbout": [
          "Nigerian Cuisine",
          "West African Cooking",
          "Jollof Rice",
          "Egusi Soup",
          "Fine Dining",
          "Culinary Arts",
          "Food Styling",
          "Private Chef Services"
        ],
        "award": [
          "[Award Name 1] — [Year]",
          "[Award Name 2] — [Year]"
        ],
        "alumniOf": {
          "@type": "EducationalOrganization",
          "name": "Le Cordon Bleu"
        },
        "sameAs": [
          "https://www.instagram.com/chefyum",
          "https://www.x.com/chefyum",
          "https://www.youtube.com/@chefyum"
        ],
        "contactPoint": {
          "@type": "ContactPoint",
          "email": "bookings@chefyum.com",
          "contactType": "Booking & Inquiries",
          "availableLanguage": "English"
        },
        "offers": {
          "@type": "Offer",
          "name": "Private Dining & Event Chef Services",
          "description": "Bespoke Nigerian fine dining experiences for private events, supper clubs, and corporate gatherings.",
          "url": "https://www.chefyum.com#contact"
        }
      }
    </script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
